<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Disc body (3/4 view) -->
  <ellipse cx="24" cy="28" rx="16" ry="8"/>
  <!-- Top surface -->
  <ellipse cx="24" cy="24" rx="16" ry="8"/>
  <!-- Side connecting lines -->
  <line x1="8" y1="24" x2="8" y2="28"/>
  <line x1="40" y1="24" x2="40" y2="28"/>
  <!-- Pressure plate -->
  <ellipse cx="24" cy="22" rx="8" ry="4"/>
  <!-- Center indicator -->
  <circle cx="24" cy="22" r="2"/>
  <!-- Legs -->
  <line x1="12" y1="32" x2="10" y2="38"/>
  <line x1="24" y1="36" x2="24" y2="40"/>
  <line x1="36" y1="32" x2="38" y2="38"/>
</svg>
